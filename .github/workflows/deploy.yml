name: CI & Deploy to Railway

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Verify lockfile is in sync
        run: npm ci

      - name: Verify @google/generative-ai in lockfile
        run: |
          if ! grep -q "google/generative-ai" package-lock.json; then
            echo "::error::@google/generative-ai missing from package-lock.json"
            echo "Run 'npm install' locally and commit both package.json and package-lock.json"
            exit 1
          fi

      - name: Build project
        run: npm run build

  deploy:
    needs: validate-and-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --detach
